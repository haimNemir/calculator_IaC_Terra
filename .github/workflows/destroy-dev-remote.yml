name: Destroy Dev Remote

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Destroy scope
        required: true
        type: choice
        options:
          - dev-addons
          - all
        default: dev-addons
      notify_email:
        description: Email for the SNS summary
        required: false
        type: string
        default: chimnem@gmail.com

permissions:
  contents: read
  id-token: write

concurrency:
  group: destroy-dev-remote
  cancel-in-progress: false

jobs:
  destroy-dev:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: calculator-dev
      KUBECONFIG: /tmp/calculator-dev-kubeconfig
      DESTROY_LOG_FILE: /tmp/calculator-dev-destroy.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::757630643687:role/calculator-github-actions-destroy-dev
          role-session-name: github-destroy-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify required tools
        shell: bash
        run: |
          set -euo pipefail
          terraform version
          aws --version
          kubectl version --client
          helm version
          jq --version

      - name: Refresh kubeconfig if the cluster still exists
        shell: bash
        run: |
          set -euo pipefail

          if aws eks describe-cluster --region "${AWS_REGION}" --name "${CLUSTER_NAME}" >/dev/null 2>&1; then
            aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER_NAME}" --kubeconfig "${KUBECONFIG}"
          else
            echo "EKS cluster ${CLUSTER_NAME} is already absent; skipping kubeconfig refresh."
          fi

      - name: Run destroy-dev.sh
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/destroy-dev.sh
          scripts/destroy-dev.sh \
            --region "${AWS_REGION}" \
            --scope "${{ github.event.inputs.scope }}" \
            --notify-email "${{ github.event.inputs.notify_email }}" \
            --log-file "${DESTROY_LOG_FILE}"

      - name: Upload destroy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destroy-dev-log-${{ github.run_id }}
          path: ${{ env.DESTROY_LOG_FILE }}
          if-no-files-found: warn
